<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ユンボはこびや</title>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#2a2f1a; touch-action:none; overscroll-behavior:none; position:fixed; }
  body { font-family:'BIZ UDPGothic', sans-serif; color:#fff; }
  canvas { display:block; }

  /* ===== 上部HUD ===== */
  #hud {
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:none; align-items:center; gap:10px; flex-wrap:wrap;
    padding:calc(env(safe-area-inset-top, 0px) + 8px) 12px 8px 12px;
    pointer-events:none;
  }
  .hudBox {
    background:rgba(30,26,14,.78); border:2px solid rgba(255,255,255,.25);
    border-radius:14px; padding:6px 12px; font-size:15px; font-weight:700;
    display:flex; align-items:center; gap:8px; min-height:44px;
  }
  #cargoChip { width:20px; height:20px; border-radius:6px; background:#666; border:2px solid #fff3; }
  #clawIcon { font-size:20px; }
  #timerBox { min-width:120px; justify-content:center; }

  /* ===== 仮想スティック(移動) ===== */
  .stickZone {
    position:fixed; bottom:calc(env(safe-area-inset-bottom, 0px) + 18px); left:20px; z-index:9;
    width:170px; height:170px; border-radius:50%;
    background:rgba(255,255,255,.07); border:2px dashed rgba(255,255,255,.28);
    display:none;
  }
  .stickKnob {
    position:absolute; left:50%; top:50%; width:72px; height:72px; margin:-36px 0 0 -36px;
    border-radius:50%; background:radial-gradient(circle at 32% 30%, #ffe08f, #d99a2b 70%);
    border:3px solid rgba(255,255,255,.7); box-shadow:0 4px 12px rgba(0,0,0,.4);
  }
  .stickLabel { position:absolute; width:100%; text-align:center; top:-28px; font-size:12px; color:#ffe9bf; font-weight:700; text-shadow:0 1px 3px #000; }

  /* ===== 視点切り替えボタン ===== */
  #viewBtn {
    position:fixed; right:16px; top:calc(env(safe-area-inset-top, 0px) + 8px); z-index:11;
    min-width:96px; min-height:52px; border-radius:16px; border:2px solid #fff5;
    background:rgba(44,58,30,.85); color:#fff; font-family:inherit; font-weight:700; font-size:14px;
    display:none; align-items:center; justify-content:center; gap:4px;
  }
  #viewBtn:active { background:rgba(120,170,70,.9); }

  /* ===== アーム上げ下げボタン ===== */
  #armCtl {
    position:fixed; right:16px; bottom:calc(env(safe-area-inset-bottom, 0px) + 130px); z-index:9;
    display:none; flex-direction:column; gap:10px; align-items:center;
  }
  .armBtn {
    width:76px; height:64px; border-radius:16px; border:2px solid #fff5;
    background:rgba(44,58,30,.85); color:#fff; font-family:inherit; font-weight:700; font-size:26px;
    display:flex; align-items:center; justify-content:center;
  }
  .armBtn:active, .armBtn.pressed { background:rgba(120,170,70,.9); transform:scale(0.96); }
  #armGaugeWrap { width:16px; height:80px; background:rgba(255,255,255,.15); border-radius:8px; overflow:hidden; border:2px solid #fff3; display:flex; align-items:flex-end; }
  #armGaugeFill { width:100%; height:40%; background:linear-gradient(0deg,#ffd94d,#7cf06a); }

  /* ===== つかむ/はなすボタン ===== */
  #clawBtn {
    position:fixed; right:24px; bottom:calc(env(safe-area-inset-bottom, 0px) + 18px); z-index:9;
    width:100px; height:100px; border-radius:50%; border:3px solid #fff6;
    background:radial-gradient(circle at 32% 28%, #ffd98f, #d9862b 75%);
    color:#3a2600; font-family:inherit; font-weight:700; font-size:15px;
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:2px;
    box-shadow:0 6px 16px rgba(0,0,0,.4);
  }
  #clawBtn.closed { background:radial-gradient(circle at 32% 28%, #ff8f6a, #c9401f 75%); color:#3a0d00; }
  #clawBtn:active { transform:scale(0.95); }

  /* ===== オーバーレイ共通 ===== */
  .overlay {
    position:fixed; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:22px;
    background:rgba(20,18,10,.75); text-align:center; padding:24px;
  }
  .bigTitle { font-size:min(9vw,50px); font-weight:700; text-shadow:0 3px 0 #4a3a12, 0 6px 18px rgba(0,0,0,.5); }
  .subText { font-size:17px; line-height:1.8; color:#fff2df; }
  .bigBtn {
    min-width:220px; min-height:64px; font-family:inherit; font-size:22px; font-weight:700;
    color:#2c2408; background:linear-gradient(#ffe08f,#e0a83a); border:none; border-radius:20px;
    box-shadow:0 6px 0 #8f5f16, 0 10px 20px rgba(0,0,0,.4); cursor:pointer;
  }
  .bigBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #8f5f16; }

  /* ===== GOオーバーレイ ===== */
  #readyOverlay { background:transparent; pointer-events:none; }
  #readyText { font-size:min(20vw,120px); font-weight:700; color:#fff; text-shadow:0 4px 0 #6a4a10, 0 8px 24px rgba(0,0,0,.6); }

  /* ===== クリア文字 ===== */
  #clearTitle {
    font-size:min(11vw,60px); font-weight:700;
    background:linear-gradient(90deg,#ffd94d,#ff9a4d,#7cf06a,#ffd94d); background-size:300% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:rainbow 2.5s linear infinite, popin .6s cubic-bezier(.2,1.6,.4,1);
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));
  }
  @keyframes rainbow { to { background-position:300% 0; } }
  @keyframes popin { from { transform:scale(.2) rotate(-8deg); opacity:0; } to { transform:scale(1) rotate(0); opacity:1; } }
  .resultRow { font-size:20px; background:rgba(30,26,14,.8); border-radius:14px; padding:12px 26px; border:2px solid #fff3; }

  /* ===== トースト ===== */
  #toast {
    position:fixed; top:26%; left:50%; transform:translateX(-50%); z-index:15;
    background:rgba(180,60,20,.92); border:2px solid #fff8; border-radius:16px;
    padding:12px 24px; font-size:20px; font-weight:700; display:none; pointer-events:none;
    box-shadow:0 6px 18px rgba(0,0,0,.5); text-align:center; max-width:80vw;
  }
  #toast.info { background:rgba(40,120,80,.92); }
</style>
</head>
<body>

<!-- ===== 上部HUD ===== -->
<div id="hud">
  <div class="hudBox" id="timerBox">⏱ <span id="timerText">0:00</span></div>
  <div class="hudBox">🪣 <span id="clawIcon">🖐</span><span id="clawText">オープン</span></div>
  <div class="hudBox">📦 <span id="cargoChip"></span><span id="cargoName">なし</span></div>
</div>

<!-- ===== 視点切り替え ===== -->
<button id="viewBtn">📷 見おろし</button>

<!-- ===== 移動スティック ===== -->
<div class="stickZone" id="stickMove"><div class="stickLabel">前進・後退・旋回</div><div class="stickKnob" id="knobMove"></div></div>

<!-- ===== アーム上げ下げ ===== -->
<div id="armCtl">
  <button class="armBtn" id="armUpBtn">▲</button>
  <div id="armGaugeWrap"><div id="armGaugeFill"></div></div>
  <button class="armBtn" id="armDownBtn">▼</button>
</div>

<!-- ===== つかむ/はなすボタン ===== -->
<button id="clawBtn">🖐<span id="clawBtnText">つかむ</span></button>

<!-- ===== スタート画面 ===== -->
<div class="overlay" id="startScreen" style="display:flex;">
  <div class="bigTitle">🚜 ユンボはこびや</div>
  <div class="subText">
    左のスティックで <b>前進・後退・旋回</b><br>
    右のボタンで <b>アームの上げ下げ</b><br>
    まるいボタンで <b>クローのつかむ・はなす</b><br>
    荷物にクローを近づけて「つかむ」、<br>
    <b>同じ色</b> のばしょまではこんで「はなす」！<br>
    高いところの荷物は <b>アームを上げて</b> とどこう。<br>
    はなすときは <b>しっかりおろしてから</b>！<br>
    たかいところから落とすとおこられちゃうよ。<br>
    ぜんぶはこべたらクリア！
  </div>
  <button class="bigBtn" id="startBtn">スタート</button>
</div>

<!-- ===== GO演出 ===== -->
<div class="overlay" id="readyOverlay">
  <div id="readyText"></div>
</div>

<!-- ===== クリア ===== -->
<div class="overlay" id="clearOverlay">
  <div id="clearTitle">ぜんぶはこび終わった！</div>
  <div class="resultRow">かかった時間：<b id="resTime"></b></div>
  <button class="bigBtn" id="againBtn">もう一度あそぶ（別コース）</button>
</div>

<div id="toast"></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

/* =========================================================
   ユンボ(パワーショベル)はこびやゲーム
   - Three.js + cannon-es / 単一HTML / iPad Safari最優先
   - 操作は「移動(前進後退旋回)」「アーム上げ下げ」「クローの開閉」の3軸のみ
   ========================================================= */

// ---------- 定数 ----------
const CFG = {
  moveSpeed: 4.4,        // 前後最高速度 m/s
  turnSpeed: 1.1,        // 旋回速度 rad/s
  accel: 7.5,            // 目標速度への追従の強さ
  armMin: -0.55,         // アーム最下点(ラジアン)
  armMax: 0.9,           // アーム最上点(ラジアン)
  armSpeed: 0.7,         // アームが動く速さ rad/s（ゆっくり・唐突にしない）
  grabDist: 1.6,         // クロー先端と荷物の水平距離(これ以内でつかめる)
  grabHeightTol: 0.75,   // クロー先端と荷物の高さの差(これ以内でつかめる)
  padDist: 1.5,          // 納品パッドとの距離判定(水平)
  grabMaxSpeed: 2.8,     // これより速く動いていたらつかめない/はなせない(安定のため)
  dropHeightLimit: 0.85, // 対象の面より、これ以上高い(または低い)位置で離すと届けられない
  pedestalHeight: 2.3,   // 高台(荷物・パッド用)の高さ(アームをしっかり上げないと届かない高さ)
  pedestalSize: 1.7,     // 高台の一辺の長さ
};

const S = { TITLE:0, READY:1, PLAYING:2, CLEAR:3 };
let state = S.TITLE;
let stateTime = 0;
let elapsed = 0;          // プレイ時間(タイマー表示用)
let courseIndex = Math.floor(Math.random() * 2);
let wrongToastCool = 0;

// ---------- Three.js 基本セットアップ ----------
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfe0ff);
scene.fog = new THREE.Fog(0xbfe0ff, 28, 66);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);

scene.add(new THREE.HemisphereLight(0xffffff, 0x7a8f5f, 0.95));
const sun = new THREE.DirectionalLight(0xfff4d6, 1.15);
sun.position.set(12, 20, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
sun.shadow.camera.top = 18;  sun.shadow.camera.bottom = -18;
scene.add(sun);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- 物理ワールド ----------
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });
// 摩擦を大きくすると高速移動時に速度が急停止する不具合が起きるため、
// 移動は摩擦力ではなく力による速度追従で行い、摩擦はごく小さい値にする
world.defaultContactMaterial.friction = 0.01;
world.defaultContactMaterial.restitution = 0.05;

const groundBody = new CANNON.Body({ type: CANNON.Body.STATIC, shape: new CANNON.Plane() });
groundBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
world.addBody(groundBody);

// ---------- ユンボ本体(見た目) ----------
const excav = new THREE.Group();          // 車体全体(移動・旋回)
let yaw = 0;

const bodyMat  = new THREE.MeshStandardMaterial({ color:0xffb01a, roughness:0.55 });
const capMat   = new THREE.MeshStandardMaterial({ color:0x2a2a2a, roughness:0.7 });
const trackMat = new THREE.MeshStandardMaterial({ color:0x3a3a3a, roughness:0.9 });
const armMat   = new THREE.MeshStandardMaterial({ color:0xffb01a, roughness:0.5 });
const bucketMat= new THREE.MeshStandardMaterial({ color:0x555b62, roughness:0.6 });

// 履帯(トラック) x2
for (const sx of [-1, 1]) {
  const track = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 2.4), trackMat);
  track.position.set(sx*0.62, 0, 0);
  track.castShadow = true; track.receiveShadow = true;
  excav.add(track);
}
// 車体下部フレーム
const chassisBase = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.3, 2.0), capMat);
chassisBase.position.set(0, 0.35, 0);
chassisBase.castShadow = true;
excav.add(chassisBase);
// キャビン(上部)
const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.75, 1.15), bodyMat);
cabin.position.set(0.05, 0.85, 0.25);
cabin.castShadow = true;
excav.add(cabin);
const cabWindow = new THREE.Mesh(new THREE.BoxGeometry(0.86, 0.42, 0.05),
  new THREE.MeshStandardMaterial({ color:0x9fd8ff, roughness:0.2, metalness:0.2 }));
cabWindow.position.set(0.05, 0.92, -0.33);
excav.add(cabWindow);

// ---------- アーム(ブーム)一式 ----------
const boomPivot = new THREE.Object3D();
boomPivot.position.set(0, 1.05, -0.75); // キャビン前方上部
excav.add(boomPivot);

const BOOM_LEN = 1.8;
const boomMesh = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.26, BOOM_LEN), armMat);
boomMesh.position.set(0, 0, -BOOM_LEN/2);
boomMesh.castShadow = true;
boomPivot.add(boomMesh);

const clawTip = new THREE.Object3D();
clawTip.position.set(0, 0, -BOOM_LEN);
boomPivot.add(clawTip);

// バケット(クロー)本体
const bucketBase = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.32, 0.3), bucketMat);
bucketBase.position.set(0, -0.06, -0.05);
bucketBase.castShadow = true;
clawTip.add(bucketBase);

// 開閉する2本のツメ
const clawProngs = [];
for (const sx of [-1, 1]) {
  const prongPivot = new THREE.Object3D();
  prongPivot.position.set(sx*0.16, -0.18, -0.1);
  clawTip.add(prongPivot);
  const prong = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.05, 0.42),
    new THREE.MeshStandardMaterial({ color:0x333333, roughness:0.5 }));
  prong.position.set(0, 0, -0.2);
  prongPivot.add(prong);
  clawProngs.push(prongPivot);
}

scene.add(excav);

let armAngle = (CFG.armMin + CFG.armMax) / 2; // アーム角度(現在値)
let armTarget = armAngle;                      // 目標角度(即座に反映、動きは速度制限)
let clawAnim = 0;                               // 0=開 1=閉(見た目の補間用、実際に持っているかで決まる)
let viewMode = 0;                               // 0=斜め上から見おろし 1=運転席(一人称)

// ---------- 物理ボディ(球で簡略化。衝突安定・全方向対応) ----------
const excavBody = new CANNON.Body({
  mass: 1,
  shape: new CANNON.Sphere(1.05),
  linearDamping: 0.75,
  angularDamping: 1.0,
});
excavBody.fixedRotation = true;
excavBody.updateMassProperties();
world.addBody(excavBody);

// ---------- コース定義 ----------
const AREA = 13;
const PKG_COLORS = [
  { hex:0xff4b4b, css:'#ff4b4b', name:'赤' },
  { hex:0x3b7dff, css:'#3b7dff', name:'青' },
  { hex:0x4bd97a, css:'#4bd97a', name:'緑' },
];

const COURSES = [
  { // コース1：こうじげんば
    name:'こうじげんば', floor:0xcbb27a, wall:0xe8dcb8,
    boxes:[
      [-6, -4, 2.2, 1.4, 2.2, 0x9a8050], [6, -4, 2.2, 1.4, 2.2, 0x9a8050],
      [0, 6, 4.0, 1.0, 1.4, 0xb0523a],
      [-8, 5, 1.6, 1.6, 1.6, 0x6a7a86], [8, 5, 1.6, 1.6, 1.6, 0x6a7a86],
    ],
    start:[0,-10],
    pkgs:[ [-9,-2], [0,2], [9,-2] ],
    pads:[ [-9,9], [0,-6], [9,9] ],
    highPkg: 1,  // 青の荷物は高台の上にある(アームを上げてつかむ)
    highPad: 2,  // 緑の納品先は高台の上にある(アームを上げて届ける)
  },
  { // コース2：ひろば
    name:'ひろば', floor:0xb9c99a, wall:0xdfe6c8,
    boxes:[
      [-4, 0, 1.6, 1.2, 1.6, 0x8a6a46], [4, 0, 1.6, 1.2, 1.6, 0x8a6a46],
      [0, -7, 3.0, 1.0, 1.0, 0x5a7a9a],
      [-8, -6, 1.4, 1.8, 1.4, 0x9a5a5a], [8, 6, 1.4, 1.8, 1.4, 0x9a5a5a],
    ],
    start:[-10,10],
    pkgs:[ [9,9], [-2,-9], [9,-9] ],
    pads:[ [-9,-9], [9,2], [-2,9] ],
    highPkg: 2,  // 緑の荷物は高台の上にある
    highPad: 0,  // 赤の納品先は高台の上にある
  },
];

const courseObjects = [];
let packages = [];
let startPos = new THREE.Vector3();
let heldPkg = null;

function addStaticBox(x, y, z, w, h, d, color) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color, roughness:0.85, transparent:true, opacity:1 }));
  mesh.position.set(x, y, z);
  mesh.userData.half = { x: w/2, y: h/2, z: d/2 }; // アームが重なっているかの判定に使う
  mesh.castShadow = true; mesh.receiveShadow = true;
  scene.add(mesh);
  const body = new CANNON.Body({ type: CANNON.Body.STATIC,
    shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) });
  body.position.set(x, y, z);
  world.addBody(body);
  courseObjects.push({ mesh, body });
}

function buildCourse(idx) {
  for (const o of courseObjects) {
    if (o.mesh) scene.remove(o.mesh);
    if (o.body) world.removeBody(o.body);
  }
  courseObjects.length = 0;
  for (const p of packages) { scene.remove(p.mesh); scene.remove(p.pad); }
  packages = [];
  heldPkg = null;
  updateClawButton();

  const C = COURSES[idx % COURSES.length];

  const floor = new THREE.Mesh(new THREE.PlaneGeometry(AREA*2, AREA*2),
    new THREE.MeshStandardMaterial({ color:C.floor, roughness:0.95 }));
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);
  courseObjects.push({ mesh: floor });

  const grid = new THREE.GridHelper(AREA*2, 13, 0xffffff, 0xffffff);
  grid.material.opacity = 0.12; grid.material.transparent = true;
  grid.position.y = 0.01;
  scene.add(grid);
  courseObjects.push({ mesh: grid });

  const wallH = 5.5;
  addStaticBox(0, wallH/2, -AREA, AREA*2, wallH, 0.5, C.wall);
  addStaticBox(0, wallH/2,  AREA, AREA*2, wallH, 0.5, C.wall);
  addStaticBox(-AREA, wallH/2, 0, 0.5, wallH, AREA*2, C.wall);
  addStaticBox( AREA, wallH/2, 0, 0.5, wallH, AREA*2, C.wall);

  for (const [x, z, w, h, d, col] of C.boxes) addStaticBox(x, h/2, z, w, h, d, col);

  startPos.set(C.start[0], 0, C.start[1]);
  const startPad = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 0.08, 32),
    new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffff, emissiveIntensity:0.25, roughness:0.6 }));
  startPad.position.set(startPos.x, 0.04, startPos.z);
  startPad.receiveShadow = true;
  scene.add(startPad);
  courseObjects.push({ mesh: startPad });

  for (let i = 0; i < 3; i++) {
    const col = PKG_COLORS[i];
    const isHighPkg = C.highPkg === i;
    const isHighPad = C.highPad === i;
    const PH = CFG.pedestalHeight, PS = CFG.pedestalSize;

    let pkgY = 0.28, padY = 0.04, padSurfaceY = 0.3, padRadius = 1.3;
    if (isHighPkg) {
      addStaticBox(C.pkgs[i][0], PH/2, C.pkgs[i][1], PS, PH, PS, 0x8a7050);
      pkgY = PH + 0.28;
    }
    if (isHighPad) {
      addStaticBox(C.pads[i][0], PH/2, C.pads[i][1], PS, PH, PS, 0x8a7050);
      padY = PH + 0.04;
      padSurfaceY = PH + 0.3;
      padRadius = 1.0;
    }

    const pkgMesh = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55),
      new THREE.MeshStandardMaterial({ color:col.hex, emissive:col.hex, emissiveIntensity:0.4, roughness:0.4 }));
    pkgMesh.position.set(C.pkgs[i][0], pkgY, C.pkgs[i][1]);
    pkgMesh.castShadow = true;
    scene.add(pkgMesh);

    const padMesh = new THREE.Mesh(new THREE.CylinderGeometry(padRadius, padRadius, 0.08, 32),
      new THREE.MeshStandardMaterial({ color:col.hex, emissive:col.hex, emissiveIntensity:0.5, roughness:0.5 }));
    padMesh.position.set(C.pads[i][0], padY, C.pads[i][1]);
    padMesh.receiveShadow = true;
    scene.add(padMesh);

    packages.push({
      color: col, mesh: pkgMesh, pad: padMesh,
      state: 'idle',
      home: new THREE.Vector3(C.pkgs[i][0], pkgY, C.pkgs[i][1]),
      padPos: new THREE.Vector3(C.pads[i][0], 0, C.pads[i][1]),
      padSurfaceY,
      isHighPkg, isHighPad,
    });
  }

  excavBody.position.set(startPos.x, 1.1, startPos.z);
  excavBody.velocity.setZero();
  yaw = Math.atan2(-(0 - startPos.x), -(0 - startPos.z));
  armAngle = armTarget = (CFG.armMin + CFG.armMax) / 2;
}

// ---------- Web Audio ----------
let AC = null, masterGain = null;
function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(AC.destination);
}
function beep(freq, dur=0.12, type='square', gain=0.14, when=0) {
  if (!AC) return;
  const t = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}
function sweep(f1, f2, dur=0.4, type='sawtooth', gain=0.12) {
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(f2, t + dur);
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}
// ---------- 陽気なリズム(マリンバ風のループメロディ) ----------
const RHYTHM_SCALE = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; // C5 D5 E5 G5 A5 C6
// 32ステップ(4フレーズ)の長めで陽気なメロディ。前半2フレーズと後半2フレーズで変化をつけている
const RHYTHM_PATTERN = [
  0,2,4,2, 1,3,5,3,           // フレーズA
  0,2,4,5, 4,2,1,0,           // フレーズA'(下降で締める)
  2,4,5,4, 3,5,4,3,           // フレーズB(少し高めに展開)
  2,1,0,1, 2,3,4,-1,          // フレーズB'(-1は休符)
];
const RHYTHM_BASS = [130.81, 130.81, 196.00, 196.00, 220.00, 220.00, 174.61, 174.61]; // C-C-G-G-Am-Am-F-F進行
const RHYTHM_BPM = 138;
const RHYTHM_STEP = 60 / RHYTHM_BPM / 2; // 8分音符ぶん
let rhythmActive = false;
let rhythmStep = 0;
let nextNoteTime = 0;

function playPluck(freq, t, dur=0.16, gain=0.15) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t + dur + 0.02);
}
function playThump(t, freq=110) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq * 0.53, t + 0.09);
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
  o.connect(g).connect(masterGain);
  o.start(t); o.stop(t + 0.13);
}
function startRhythm() {
  if (!AC || rhythmActive) return;
  rhythmActive = true;
  rhythmStep = 0;
  nextNoteTime = AC.currentTime + 0.05;
}
function stopRhythm() { rhythmActive = false; }
function updateRhythm() {
  if (!rhythmActive || !AC) return;
  while (nextNoteTime < AC.currentTime + 0.15) {
    const idx = RHYTHM_PATTERN[rhythmStep % RHYTHM_PATTERN.length];
    if (idx >= 0) playPluck(RHYTHM_SCALE[idx], nextNoteTime);
    if (rhythmStep % 4 === 0) {
      const bassIdx = Math.floor(rhythmStep / 4) % RHYTHM_BASS.length;
      playThump(nextNoteTime, RHYTHM_BASS[bassIdx]);
    }
    rhythmStep++;
    nextNoteTime += RHYTHM_STEP;
  }
}

const SND = {
  ready: () => beep(660, 0.15, 'square', 0.14),
  go:    () => { beep(880, 0.18, 'square', 0.18); beep(1320, 0.22, 'square', 0.14, 0.12); },
  grab:  () => { beep(520, 0.09, 'sine', 0.18); beep(780, 0.12, 'sine', 0.18, 0.09); },
  release:() => beep(300, 0.12, 'sine', 0.14),
  deliver: () => { beep(660,0.12,'triangle',0.2); beep(830,0.12,'triangle',0.2,0.12); beep(1100,0.25,'triangle',0.2,0.24); },
  wrong: () => { beep(160, 0.2, 'square', 0.16); beep(120, 0.22, 'square', 0.14, 0.1); },
  tooHigh: () => { beep(320, 0.12, 'sawtooth', 0.16); beep(220, 0.18, 'sawtooth', 0.16, 0.1); beep(150, 0.22, 'sawtooth', 0.14, 0.22); },
  clank: () => beep(220, 0.08, 'square', 0.1),
  fanfare: () => {
    const notes = [523, 659, 784, 1046, 784, 1046, 1318];
    notes.forEach((f, i) => { beep(f, 0.22, 'triangle', 0.2, i*0.16); beep(f/2, 0.22, 'square', 0.08, i*0.16); });
  },
};

// ---------- 仮想スティック(移動用・1本のみ) ----------
function makeStick(zoneEl, knobEl) {
  const st = { x:0, y:0, touchId:null };
  const R = 60;
  function setFromEvent(clientX, clientY) {
    const rect = zoneEl.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = clientX - cx, dy = clientY - cy;
    const len = Math.hypot(dx, dy);
    if (len > R) { dx *= R/len; dy *= R/len; }
    st.x = dx / R;
    st.y = -dy / R;
    knobEl.style.transform = `translate(${dx}px, ${dy}px)`;
  }
  function reset() {
    st.x = 0; st.y = 0; st.touchId = null;
    knobEl.style.transform = 'translate(0px, 0px)';
  }
  zoneEl.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (st.touchId !== null) return;
    const t = e.changedTouches[0];
    st.touchId = t.identifier;
    setFromEvent(t.clientX, t.clientY);
  }, { passive:false });
  document.addEventListener('touchmove', (e) => {
    for (const t of e.changedTouches) if (t.identifier === st.touchId) setFromEvent(t.clientX, t.clientY);
  }, { passive:false });
  document.addEventListener('touchend', (e) => {
    for (const t of e.changedTouches) if (t.identifier === st.touchId) reset();
  });
  document.addEventListener('touchcancel', (e) => {
    for (const t of e.changedTouches) if (t.identifier === st.touchId) reset();
  });
  zoneEl.addEventListener('mousedown', (e) => {
    st.touchId = 'mouse';
    setFromEvent(e.clientX, e.clientY);
    const mv = (ev) => { if (st.touchId === 'mouse') setFromEvent(ev.clientX, ev.clientY); };
    const up = () => { reset(); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
  });
  st.reset = reset;
  return st;
}
const stickMove = makeStick(document.getElementById('stickMove'), document.getElementById('knobMove'));

function bindHold(el, val) {

}

// ---------- 荷物のロジック ----------
function horizDistTo(pos) {
  const dx = excavBody.position.x - pos.x;
  const dz = excavBody.position.z - pos.z;
  return Math.hypot(dx, dz);
}
function excavSpeed() {
  const v = excavBody.velocity;
  return Math.hypot(v.x, v.z);
}
const clawWorldPos = new THREE.Vector3();

function dropPackageToGround(p) {
  p.state = 'idle';
  const gx = THREE.MathUtils.clamp(clawWorldPos.x, -AREA+1, AREA-1);
  const gz = THREE.MathUtils.clamp(clawWorldPos.z, -AREA+1, AREA-1);
  p.mesh.position.set(gx, 0.28, gz);
  p.mesh.rotation.set(0, 0, 0);
  heldPkg = null;
  SND.release();
}

function tryGrab() {
  if (heldPkg) return;
  if (excavSpeed() > CFG.grabMaxSpeed) { showToast('動きながらは、つかめないよ'); return; }
  for (const p of packages) {
    if (p.state !== 'idle') continue;
    const dxz = Math.hypot(clawWorldPos.x - p.mesh.position.x, clawWorldPos.z - p.mesh.position.z);
    const dy = Math.abs(clawWorldPos.y - p.mesh.position.y);
    if (dxz < CFG.grabDist && dy < CFG.grabHeightTol) {
      p.state = 'held';
      heldPkg = p;
      SND.grab();
      showToast(`${p.color.name}の荷物をつかんだ！`, true, 1000);
      updateClawButton();
      return;
    }
  }
  // 近くにつかめる荷物がなかった(ボタンの表示は「つかむ」のまま変えない)
  SND.clank();
}

function tryRelease() {
  if (!heldPkg) return;
  if (excavSpeed() > CFG.grabMaxSpeed) { showToast('動きながらは、はなせないよ'); return; }
  const p = heldPkg;

  // クロー先端が「どのパッドの近く」にいるか(自分のでも他人のでも)を調べる
  let nearestPad = null, nearestDist = Infinity;
  for (const q of packages) {
    const d = Math.hypot(clawWorldPos.x - q.padPos.x, clawWorldPos.z - q.padPos.z);
    if (d < CFG.padDist && d < nearestDist) { nearestDist = d; nearestPad = q; }
  }

  // 対象の面(パッドの上、なければ地面)より高すぎ・低すぎる位置で離したら失敗にする
  const surfaceY = nearestPad ? nearestPad.padSurfaceY : 0.3;
  const heightGap = clawWorldPos.y - surfaceY;
  if (heightGap > CFG.dropHeightLimit) {
    SND.tooHigh();
    showToast('❗ たかいところから落とさないで！ちゃんとおろしてからはなそう', false, 1800);
    spawnFailPoof(clawWorldPos.x, Math.max(0.2, surfaceY), clawWorldPos.z);
    dropPackageToGround(p);
    updateClawButton();
    return;
  }
  if (nearestPad && heightGap < -CFG.dropHeightLimit) {
    SND.tooHigh();
    showToast('⬆️ もうすこしアームを上げてからとどけよう', false, 1800);
    spawnFailPoof(clawWorldPos.x, Math.max(0.2, clawWorldPos.y), clawWorldPos.z);
    dropPackageToGround(p);
    updateClawButton();
    return;
  }

  if (nearestPad === p) {
    p.state = 'delivered';
    p.mesh.position.set(p.padPos.x, surfaceY + 0.06, p.padPos.z);
    p.mesh.rotation.set(0, 0, 0);
    heldPkg = null;
    SND.deliver();
    showToast(`${p.color.name}の荷物をとどけた！ 🎉`, true, 1200);
    updateClawButton();
    const rest = packages.filter(q => q.state !== 'delivered').length;
    if (rest === 0) setTimeout(() => doClear(), 900);
    return;
  }
  if (nearestPad) { SND.wrong(); showToast('❌ 色がちがうよ！'); }
  dropPackageToGround(p);
  updateClawButton();
}

function updateHeldFollow() {
  if (heldPkg) {
    const m = heldPkg.mesh;
    // 安定して追従(揺れすぎないように補間)
    m.position.lerp(new THREE.Vector3(clawWorldPos.x, clawWorldPos.y - 0.32, clawWorldPos.z), 0.55);
    m.rotation.y = yaw;
  }
}

// ---------- 紙吹雪(クリア演出) ----------
let confetti = null;
function spawnConfetti() {
  clearConfetti();
  const N = 320;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N*3), col = new Float32Array(N*3);
  const vel = [];
  const palette = [0xff4b4b, 0xffd94d, 0x4bff7a, 0x4bc8ff, 0xff7ac8, 0xffffff];
  const c = new THREE.Color();
  for (let i = 0; i < N; i++) {
    pos[i*3]   = excavBody.position.x + (Math.random()-0.5)*2;
    pos[i*3+1] = excavBody.position.y + 1 + Math.random()*2;
    pos[i*3+2] = excavBody.position.z + (Math.random()-0.5)*2;
    c.setHex(palette[Math.floor(Math.random()*palette.length)]);
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    vel.push(new THREE.Vector3((Math.random()-0.5)*7, 4 + Math.random()*7, (Math.random()-0.5)*7));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size:0.16, vertexColors:true });
  confetti = { points: new THREE.Points(geo, mat), vel };
  scene.add(confetti.points);
}
function clearConfetti() {
  if (confetti) { scene.remove(confetti.points); confetti.points.geometry.dispose(); confetti = null; }
}
function updateConfetti(dt) {
  if (!confetti) return;
  const pos = confetti.points.geometry.attributes.position;
  for (let i = 0; i < confetti.vel.length; i++) {
    const v = confetti.vel[i];
    v.y -= 9.8 * dt * 0.6;
    pos.array[i*3]   += v.x * dt;
    pos.array[i*3+1] += v.y * dt;
    pos.array[i*3+2] += v.z * dt;
    if (pos.array[i*3+1] < 0.05) { pos.array[i*3+1] = 0.05; v.set(0,0,0); }
  }
  pos.needsUpdate = true;
}

// ---------- 失敗(高いところから落とした)ときの砂ぼこりエフェクト ----------
const failPoofs = [];
function spawnFailPoof(x, y, z) {
  const N = 26;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N*3), col = new Float32Array(N*3);
  const vel = [];
  const palette = [0x9a8060, 0x7a6045, 0xaaaaaa, 0x6a5540];
  const c = new THREE.Color();
  for (let i = 0; i < N; i++) {
    pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
    c.setHex(palette[Math.floor(Math.random()*palette.length)]);
    col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.3 + Math.random() * 2.2;
    vel.push(new THREE.Vector3(Math.cos(ang)*spd, 1.2 + Math.random()*1.8, Math.sin(ang)*spd));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size:0.15, vertexColors:true, transparent:true, opacity:1 });
  const points = new THREE.Points(geo, mat);
  scene.add(points);
  failPoofs.push({ points, vel, life: 0 });
}
function updateFailPoofs(dt) {
  for (let i = failPoofs.length - 1; i >= 0; i--) {
    const f = failPoofs[i];
    f.life += dt;
    const pos = f.points.geometry.attributes.position;
    for (let j = 0; j < f.vel.length; j++) {
      const v = f.vel[j];
      v.y -= 9.8 * dt * 0.7;
      pos.array[j*3]   += v.x * dt;
      pos.array[j*3+1] += v.y * dt;
      pos.array[j*3+2] += v.z * dt;
      if (pos.array[j*3+1] < 0.03) { pos.array[j*3+1] = 0.03; v.x *= 0.8; v.z *= 0.8; v.y = 0; }
    }
    pos.needsUpdate = true;
    f.points.material.opacity = Math.max(0, 1 - f.life / 0.7);
    if (f.life > 0.7) {
      scene.remove(f.points);
      f.points.geometry.dispose();
      failPoofs.splice(i, 1);
    }
  }
}
function clearFailPoofs() {
  for (const f of failPoofs) { scene.remove(f.points); f.points.geometry.dispose(); }
  failPoofs.length = 0;
}

// ---------- 車体の制御 ----------
function controlExcav(dt) {
  if (state !== S.PLAYING) {
    excavBody.velocity.x *= 0.8; excavBody.velocity.z *= 0.8;
    return;
  }
  yaw += -stickMove.x * CFG.turnSpeed * dt;
  const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const throttle = stickMove.y;
  const targetVX = fwd.x * throttle * CFG.moveSpeed;
  const targetVZ = fwd.z * throttle * CFG.moveSpeed;
  const v = excavBody.velocity, m = excavBody.mass;
  const fx = (targetVX - v.x) * CFG.accel * m;
  const fz = (targetVZ - v.z) * CFG.accel * m;
  excavBody.applyForce(new CANNON.Vec3(fx, 0, fz));

  // アーム角度をゆっくり更新(唐突な動きを防ぐ)
  armTarget = THREE.MathUtils.clamp(armTarget + armInput * CFG.armSpeed * dt, CFG.armMin, CFG.armMax);
  const armDiff = armTarget - armAngle;
  const maxStep = CFG.armSpeed * dt;
  armAngle += THREE.MathUtils.clamp(armDiff, -maxStep, maxStep);
  boomPivot.rotation.x = armAngle;

  // クローの開閉アニメーション(補間)
  const clawGoal = heldPkg ? 1 : 0;
  clawAnim += (clawGoal - clawAnim) * Math.min(1, dt*8);
  const openAngle = THREE.MathUtils.lerp(0.55, 0.05, clawAnim);
  clawProngs[0].rotation.x = -openAngle;
  clawProngs[1].rotation.x = -openAngle;
}

function syncExcavVisual() {
  excav.position.set(excavBody.position.x, excavBody.position.y - 1.05 + 0.4, excavBody.position.z);
  excav.rotation.y = yaw;
  excav.updateMatrixWorld(true);
  clawTip.getWorldPosition(clawWorldPos);
}

// ---------- カメラ(三人称・追従 / 一人称・運転席) ----------
const camPos = new THREE.Vector3();
const camTarget = new THREE.Vector3();
function updateCamera(dt) {
  if (viewMode === 0) {
    // 斜め上から見おろす追従カメラ
    const back = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
    const desired = new THREE.Vector3(
      excav.position.x + back.x * 6.6,
      excav.position.y + 4.6,
      excav.position.z + back.z * 6.6
    );
    const k = 1 - Math.exp(-5 * dt);
    camPos.lerp(desired, k);
    camera.position.copy(camPos);
    camTarget.lerp(new THREE.Vector3(excav.position.x, excav.position.y + 0.8, excav.position.z), 1 - Math.exp(-8*dt));
    camera.lookAt(camTarget);
  } else {
    // 運転席からの一人称視点(キャビンの窓の位置から進行方向を見る)
    const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const local = new THREE.Vector3(0.05, 0, -0.1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
    camPos.set(excav.position.x + local.x, excav.position.y + 1.5, excav.position.z + local.z);
    camera.position.copy(camPos);
    camTarget.set(
      camPos.x + fwd.x * 8,
      camPos.y - 1.1,   // 少し下(アーム・バケットが見やすいように)
      camPos.z + fwd.z * 8
    );
    camera.lookAt(camTarget);
  }
}

// ---------- カメラをさえぎる壁 / アームが重なった物体の半透明化(オクルージョンフェード) ----------
const wallRaycaster = new THREE.Raycaster();
let fadedWalls = new Set();
const _pivotWorld = new THREE.Vector3();
const _midWorld = new THREE.Vector3();

function boxOverlapsPoint(mesh, px, py, pz, margin) {
  const half = mesh.userData.half;
  if (!half) return false;
  return Math.abs(px - mesh.position.x) < half.x + margin &&
         Math.abs(py - mesh.position.y) < half.y + margin &&
         Math.abs(pz - mesh.position.z) < half.z + margin;
}

function updateWallFade(dt) {
  const camFaded = new Set();
  const armFaded = new Set();

  if (viewMode === 0) {
    // カメラと車体の間にある壁を透明化(自分が壁で見えなくなるのを防ぐ、こちらはしっかり透かす)
    const from = new THREE.Vector3(camTarget.x, camTarget.y + 0.3, camTarget.z);
    const to = camera.position;
    const dir = new THREE.Vector3().subVectors(to, from);
    const dist = dir.length();
    if (dist > 0.05) {
      dir.normalize();
      wallRaycaster.set(from, dir);
      wallRaycaster.far = Math.max(0, dist - 0.4); // カメラ自体の手前は除外
      const collidables = [];
      for (const o of courseObjects) if (o.body && o.mesh) collidables.push(o.mesh);
      const hits = wallRaycaster.intersectObjects(collidables, false);
      for (const h of hits) camFaded.add(h.object);
    }
  }

  // アーム(ブーム〜クロー)が台や壁にめり込んで見えるのを防ぐため、
  // 重なっている物体があれば「気づく程度に薄く」する(カメラ遮蔽ほど透かさない)
  boomPivot.getWorldPosition(_pivotWorld);
  _midWorld.lerpVectors(_pivotWorld, clawWorldPos, 0.5);
  const armPts = [_pivotWorld, _midWorld, clawWorldPos];
  for (const o of courseObjects) {
    if (!o.body || !o.mesh || !o.mesh.userData.half) continue;
    for (const pt of armPts) {
      if (boxOverlapsPoint(o.mesh, pt.x, pt.y, pt.z, 0.3)) { armFaded.add(o.mesh); break; }
    }
  }

  fadedWalls = new Set([...camFaded, ...armFaded]);
  for (const o of courseObjects) {
    if (!o.body || !o.mesh || !o.mesh.material) continue;
    const mat = o.mesh.material;
    let targetOpacity = 1;
    if (camFaded.has(o.mesh)) targetOpacity = 0.15;      // カメラを遮る壁はしっかり透かす
    else if (armFaded.has(o.mesh)) targetOpacity = 0.55; // アームのめり込みは薄くする程度
    mat.opacity += (targetOpacity - mat.opacity) * Math.min(1, dt * 10);
    mat.depthWrite = mat.opacity > 0.6; // 半透明時の重なり順の乱れを軽減
  }
}

// ---------- メインループ ----------
const clock = new THREE.Clock();

function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 1/30); // 120Hz/フレーム落ち両対応

  if (state === S.PLAYING) {
    elapsed += dt;
    updateHeldFollow();
    updateHUD();
  }

  controlExcav(dt);
  world.step(1/60, dt, 4);
  syncExcavVisual();

  updateRhythm();

  const tt = clock.elapsedTime;
  for (const p of packages) {
    if (p.state === 'idle') {
      p.mesh.material.emissiveIntensity = 0.35 + 0.35 * Math.sin(tt*4);
      p.mesh.rotation.y += dt * 0.8;
    }
    p.pad.material.emissiveIntensity = 0.35 + 0.3 * Math.sin(tt*3 + 1);
  }

  updateConfetti(dt);
  updateFailPoofs(dt);
  updateCamera(dt);
  updateWallFade(dt);
  renderer.render(scene, camera);
}

buildCourse(courseIndex);
updateHUD();
loop();
</script>
